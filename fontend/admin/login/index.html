<!DOCTYPE html>
<html lang="es" class="login-page">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="stylesheet" href="../index.css">
 <style>
 .login-container {
 width: 100%;
 height: 100vh;
 display: flex;
 flex-direction: column;
 }
 
 /* ===== COLUMNA IZQUIERDA (OCULTA EN MOBILE) ===== */
 
 .login-first-column {
 display: none;
 }
 
 /* ===== COLUMNA DERECHA ===== */
 
 .login-second-column {
 width: 100%;
 min-height: 100vh;
 padding: var(--spacing-3xl) var(--spacing-3xl);
 display: flex;
 flex-direction: column;
 overflow-y: auto;
 background-color: var(--color-bg-primary);
 }
 
 /* ===== FORMULARIO ===== */
 
 .login-form {
 display: flex;
 flex-direction: column;
 width: 100%;
 }
 
 /* ===== TÍTULO ===== */
 
 .form-title {
 font-size: var(--font-size-xl);
 font-weight: var(--font-weight-semibold);
 color: var(--color-text-primary);
 margin-bottom: var(--spacing-lg);
 }
 
 /* ===== LABELS ===== */
 
 .username-label,
 .password-label {
 margin: var(--spacing-md) 0 var(--spacing-sm);
 font-size: var(--font-size-base);
 font-weight: var(--font-weight-semibold);
 color: var(--color-text-primary);
 }
 
 /* ===== INPUTS CON ÍCONO ===== */
 
 .input-icon {
 position: relative;
 width: 100%;
 border: 1.2px solid var(--color-border-dark);
 border-radius: var(--border-radius-lg);
 transition: border-color var(--transition-fast);
 background-color: var(--color-bg-primary);
 }
 
 .input-icon:focus-within {
 border-color: var(--color-primary);
 }
 
 .input-icon svg {
 position: absolute;
 left: var(--spacing-md);
 top: 50%;
 transform: translateY(-50%);
 width: 20px;
 height: 20px;
 color: var(--color-text-muted);
 pointer-events: none;
 }
 
 .input-icon:has(input:focus) svg {
 color: var(--color-primary);
 }
 
 .username-input,
 .password-input {
 width: 100%;
 padding: var(--spacing-md);
 padding-left: 4rem;
 border: none;
 outline: none;
 background: transparent;
 font-size: var(--font-size-base);
 color: var(--color-text-primary);
 }
 
 .username-input::placeholder,
 .password-input::placeholder {
 color: var(--color-text-muted);
 }
 
 /* ===== BOTÓN ===== */
 
 .login-button {
 margin-top: var(--spacing-xl);
 padding: var(--spacing-md) 0;
 background-color: var(--color-success);
 color: var(--color-white);
 font-size: var(--font-size-lg);
 font-weight: var(--font-weight-semibold);
 border: none;
 border-radius: var(--border-radius-lg);
 cursor: pointer;
 transition: background-color var(--transition-fast);
 }
 
 .login-button:active {
 background-color: #047857;
 }
 
 /* ===== TEXTO AUXILIAR ===== */
 
 .register-text {
 margin: var(--spacing-lg) 0;
 font-size: var(--font-size-base);
 color: var(--color-text-secondary);
 text-align: center;
 }
 
 /* ===== ERROR ===== */
 
 .login-error p {
 color: var(--color-error);
 font-size: var(--font-size-sm);
 }
 
 /* ===== FOOTER ===== */
 /* El footer usa la clase .main-footer definida en index.css */

 }

 flex-direction: row;

 }

 }

 }

 </style>

 <title>Login - Forms</title>
</head>
<body class="login-page">
 <div class="login-container">
 <div class="login-first-column">
 <img class="brand-logo" src="./../../src/img/logo-white.png" alt="Logo" draggable="false">
 </div>
 
 <div class="login-second-column">
 <div class="form-container">
 <!-- Formulario -->
 <form class="login-form" id="loginForm" action="" onsubmit="return false;">
 <div class="form-title-container">
 <p class="form-title">Sistema de Gestión de Formularios</p>
 </div>
 
 <!-- Mensaje de Error -->
 <div class="login-error" id="loginError" style="display: none;">
 <p></p>
 </div>


 <div class="input-container-username">
 <label class="username-label" for="username">
 Usuario
 <span>*</span>
 </label>
 <div class="input-icon">
 <svg class="icon-user" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
 <path d="M15.75 6C15.75 8.07107 14.071 9.75 12 9.75C9.9289 9.75 8.24996 8.07107 8.24996 6C8.24996 3.92893 9.9289 2.25 12 2.25C14.071 2.25 15.75 3.92893 15.75 6Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
 <path d="M4.5011 20.1182C4.5714 16.0369 7.90184 12.75 12 12.75C16.0982 12.75 19.4287 16.0371 19.4988 20.1185C17.216 21.166 14.6764 21.75 12.0003 21.75C9.32396 21.75 6.78406 21.1659 4.5011 20.1182Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
 </svg>
 <input
 type="text"
 id="username"
 class="username-input"
 required
 minlength="4"
 autocomplete="username"
 placeholder="Ingresa tu usuario"
 >
 </div>
 </div>

 <div class="input-container-password">
 <label class="password-label" for="password">
 Contraseña
 <span>*</span>
 </label>
 <div class="input-icon">
 <svg class="icon-lock" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
 <path d="M16.5 10.5V6.75C16.5 4.26472 14.4853 2.25 12 2.25C9.51472 2.25 7.5 4.26472 7.5 6.75V10.5M6.75 21.75H17.25C18.4926 21.75 19.5 20.7426 19.5 19.5V12.75C19.5 11.5074 18.4926 10.5 17.25 10.5H6.75C5.50736 10.5 4.5 11.5074 4.5 12.75V19.5C4.5 20.7426 5.50736 21.75 6.75 21.75Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
 </svg>
 <input
 type="password"
 id="password"
 class="password-input"
 required
 minlength="8"
 autocomplete="current-password"
 placeholder="Ingresa tu contraseña"
 >
 </div>
 </div>

 <button class="login-button" type="submit">
 <span>Acceder</span>
 </button>

 <div class="register-text">
 <p>Pantalla solo para uso interno. Si no tienes una cuenta, contacta tecnologia@example.com.</p>
 </div>

 </form>
 </div>

 <!-- Footer -->
 <footer class="main-footer">
 © 2025 Proyecto Forms. Todos los derechos reservados.
 </footer>
 </div>
 </div>

 <!-- Page scripts -->
 <script type="module" src="index.js"></script>
</body>
</html>
