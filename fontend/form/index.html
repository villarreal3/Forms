<!DOCTYPE html>
<html lang="es">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Forms</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
 <style>
 @keyframes fadeIn {
 from { 
 opacity: 0; 
 transform: translateY(2rem); 
 }
 to { 
 opacity: 1; 
 transform: translateY(0); 
 }
 }
 .fade-in {
 animation: fadeIn 0.5s ease-out;
 }
 .text-3xxl {
 font-size: 2.25rem;
 line-height: 2.5rem;
 }
 .social-toggle-container {
 position: relative;
 }

 .social-toggle-label {
 display: flex;
 flex-direction: column;
 align-items: center;
 cursor: pointer;
 }

 .social-toggle-input {
 display: none;
 }

 .social-toggle-slider {
 width: 6rem;
 height: 3rem;
 background-color: #ccc;
 border-radius: 3rem;
 position: relative;
 transition: background-color 0.3s;
 cursor: pointer;
 margin: 0 auto 1rem;
 }

 .social-toggle-input:checked + .social-toggle-slider {
 background-color: #1e40af;
 }

 .social-toggle-knob {
 width: 2.6rem;
 height: 2.6rem;
 background-color: white;
 border-radius: 50%;
 position: absolute;
 top: 0.2rem;
 left: 0.2rem;
 transition: transform 0.3s;
 display: flex;
 align-items: center;
 justify-content: center;
 box-shadow: 0 0.2rem 0.4rem rgba(0, 0, 0, 0.2);
 }

 .social-toggle-input:checked + .social-toggle-slider .social-toggle-knob {
 transform: translateX(3rem);
 }

 .social-toggle-text {
 display: block;
 text-align: center;
 font-size: 0.875rem;
 color: #374151;
 margin-top: 0.5rem;
 }

 .social-field {
 margin-top: 1rem;
 }

 /* Header con opacidad */
 .public-form-header-subtitle {
 opacity: 0.8;
 }

 /* Grid para campos del formulario: móvil <600, tablet 600-1023, desktop >=1024 */
 .form-fields-grid {
 display: grid;
 grid-template-columns: 1fr;
 gap: 1.5rem;
 }
 .form-fields-grid:has(.social-toggle-label) {
 grid-template-columns: repeat(2, 1fr);
 }
 @media (min-width: 600px) {
 .form-fields-grid {
 grid-template-columns: repeat(2, 1fr);
 }
 .form-fields-grid:has(.social-toggle-label) {
 grid-template-columns: repeat(2, 1fr);
 }
 }
 @media (min-width: 1024px) {
 .form-fields-grid:has(.social-toggle-label) {
 grid-template-columns: repeat(4, 1fr);
 }
 }
 .form-fields-grid--consent {
 grid-template-columns: 1fr !important;
 }

 /* Logo container: se adapta al tamaño de la imagen (ancho completo, altura según imagen) */
 #logoContainer {
 width: 100%;
 max-width: 100vw;
 overflow: hidden;
 display: block;
 line-height: 0;
 }
 #logoContainer img {
 width: 100%;
 height: auto;
 max-height: 100vh;
 object-fit: contain;
 display: block;
 vertical-align: middle;
 }

 /* Opciones del select: texto oscuro sobre fondo del menú para que siempre se vean */
 #formContainer select option,
 #registrationForm select option {
 background-color: #ffffff;
 color: #111827;
 }

 /* Modal de éxito */
 #successModalBackdrop {
 position: fixed;
 inset: 0;
 background-color: rgba(0, 0, 0, 0.5);
 display: flex;
 align-items: center;
 justify-content: center;
 z-index: 9999;
 opacity: 0;
 visibility: hidden;
 transition: opacity 0.2s ease, visibility 0.2s ease;
 }
 #successModalBackdrop.show {
 opacity: 1;
 visibility: visible;
 }
 #successModalBackdrop .success-modal-box {
 background: white;
 border-radius: 1rem;
 padding: 2rem;
 max-width: 28rem;
 width: 90%;
 box-sizing: border-box;
 box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
 transform: scale(0.95);
 transition: transform 0.2s ease;
 }
 @media (max-width: 767px) {
 #successModalBackdrop .success-modal-box {
 width: 90%;
 max-width: 90vw;
 }
 }
 #successModalBackdrop.show .success-modal-box {
 transform: scale(1);
 }
 </style>

 <script>
 // ================== CONSTANTES Y FUNCIONES GLOBALES ==================

 const hexToRgb = (hex) => {

 return res ? {
 r: parseInt(res[1], 16),
 g: parseInt(res[2], 16),

 } : null;
 };
 
 const getFormIdFromURL = () => {
 const p = new URLSearchParams(window.location.search);
 return p.get('id') || p.get('form_id');
 };

 const formatEventDate = (value) => {

 if (Number.isNaN(d.getTime())) return String(value);

 // ================== GESTOR DE ALTURA PARA IFRAME ==================
 
 class HeightNotifier {
 static notify() {
 if (window.parent === window) return;
 const h = Math.max(
 document.body.scrollHeight,
 document.documentElement.scrollHeight,
 document.body.offsetHeight,
 document.documentElement.offsetHeight,
 document.documentElement.clientHeight
 );
 window.parent.postMessage({ type: 'form-embed-height', height: h }, '*');
 }
 }
 
 // ================== CLIENTE API ==================
 // Usar las funciones centralizadas de config.js
 
 class ApiClient {
 _checkFunctions() {
 if (!window.getPublicForm || !window.getPublicFormSections || !window.getPublicFormCustomization || !window.getPublicFormLogo || !window.submitForm) {
 throw new Error('Las funciones de API no están disponibles. Verifica que config.js se haya cargado correctamente.');
 }
 }
 
 async getForm(formId) {
 this._checkFunctions();
 try {
 console.log('[ApiClient] Obteniendo formulario:', formId);
 const data = await window.getPublicForm(formId);
 console.log('[ApiClient] Respuesta getForm completa:', data);
 console.log('[ApiClient] Tipo de respuesta:', typeof data);
 console.log('[ApiClient] Estructura de respuesta:', {
 hasSuccess: 'success' in (data || {}),

 });
 return { res: { ok: true, status: 200 }, data };

 // ================== Imagen de cabecera (logo) — async, API dedicada ==================
 class FormLogoLoader {
 constructor(containerId = 'logoContainer') {
 this.container = typeof containerId === 'string' ? document.getElementById(containerId) : containerId;
 this._cache = null;
 this.formId = null;
 }

 _resolveImageUrl(pathOrUrl) {
 if (!pathOrUrl) return '';
 const s = String(pathOrUrl).trim();
 if (!s) return '';
 if (s.startsWith('http')) return s;
 const base = typeof API_BASE_URL !== 'undefined' ? API_BASE_URL : (window.API_CONFIG?.FORMS_API_BASE_URL || '');
 return `${base}${s.startsWith('/') ? '' : '/'}${s}`;
 }

 _pickUrl() {
 if (!this._cache) return null;
 const isMobile = window.innerWidth < 768;
 const { logo_url, logo_url_mobile } = this._cache;
 if (isMobile && logo_url_mobile) return logo_url_mobile;
 return logo_url || logo_url_mobile || null;
 }

 _render() {
 const logoContainer = this.container;
 if (!logoContainer) return;
 const raw = this._pickUrl();
 if (!raw) {
 logoContainer.innerHTML = '';
 return;
 }
 const url = this._resolveImageUrl(raw);
 const img = document.createElement('img');
 img.src = url;
 img.alt = 'Logo';
 img.className = 'logo-container-img';
 img.onerror = function() {
 console.error('[FormLogoLoader] Error cargando imagen:', this.src);
 fetch(this.src, { method: 'HEAD' }).catch(() => {});
 this.style.display = 'none';
 };
 logoContainer.innerHTML = '';
 logoContainer.appendChild(img);
 }

 /**
 * Carga URLs de logo desde GET /api/public/forms/{id}/logo y pinta la imagen.
 * @param {string|number} formId
 */
 async load(formId) {
 this.formId = formId;
 if (!window.getPublicFormLogo) {
 console.warn('[FormLogoLoader] getPublicFormLogo no está disponible');
 return;
 }
 try {
 const data = await window.getPublicFormLogo(formId);
 const logo_url = data?.logo_url ?? '';
 const logo_url_mobile = data?.logo_url_mobile ?? '';
 this._cache = { logo_url, logo_url_mobile };
 this._render();
 } catch (e) {
 console.error('[FormLogoLoader] Error cargando logos:', e);
 this._cache = null;
 if (this.container) this.container.innerHTML = '';
 }
 }

 /** Sin nueva petición: alterna móvil/escritorio según ancho. */
 refresh() {
 this._render();
 }

 clear() {
 this._cache = null;
 if (this.container) this.container.innerHTML = '';
 }
 }
 
 // ================== GESTOR DE PERSONALIZACIÓN ==================
 
 class CustomizationManager {
 apply(customization) {
 const primaryColor = customization.primary_color || '#3B82F6';
 const secondaryColor = customization.secondary_color || '#1E40AF';
 const background = customization.background_color || '#FFFFFF';
 const textColor = customization.text_color || '#1F2937';
 const titleColor = customization.title_color || '#FFFFFF';
 
 const formColor = customization.form_container_color || '#FFFFFF';
 const descColor = customization.description_container_color || '#FFFFFF';
 const formOpacity = customization.form_container_opacity != null &&
 customization.form_container_opacity !== ''
 ? parseFloat(customization.form_container_opacity) : 1;
 const descOpacity = customization.description_container_opacity != null &&
 customization.description_container_opacity !== ''
 ? parseFloat(customization.description_container_opacity) : 1;
 const metaTextColor = customization.form_meta_text_color || titleColor;
 const metaBgStart = customization.form_meta_background_start || customization.form_meta_background || '';
 const metaBgEnd = customization.form_meta_background_end || secondaryColor;
 const metaBgOpacity = customization.form_meta_background_opacity != null &&
 customization.form_meta_background_opacity !== ''
 ? parseFloat(customization.form_meta_background_opacity) : 1;
 
 const body = $('#formBody');
 if (body) {
 body.style.backgroundColor = background;
 body.style.color = textColor;
 }
 
 const header = document.querySelector('header');
 if (header) {
 header.style.background = `linear-gradient(to right, ${primaryColor}, ${secondaryColor})`;
 }
 
 $('#headerIcon')?.style.setProperty('color', titleColor, 'important');
 $('#headerTitle')?.style.setProperty('color', titleColor, 'important');
 $('#headerSubtitle')?.style.setProperty('color', titleColor, 'important');
 
 const formRgb = hexToRgb(formColor);
 const descRgb = hexToRgb(descColor);
 const formBg = formRgb
 ? `rgba(${formRgb.r},${formRgb.g},${formRgb.b},${formOpacity})` : formColor;
 const descBg = descRgb
 ? `rgba(${descRgb.r},${descRgb.g},${descRgb.b},${descOpacity})` : descColor;
 const metaStartRgb = hexToRgb(metaBgStart);
 const metaEndRgb = hexToRgb(metaBgEnd);
 const metaBg = (metaStartRgb && metaEndRgb)
 ? `linear-gradient(to right, rgba(${metaStartRgb.r},${metaStartRgb.g},${metaStartRgb.b},${metaBgOpacity}), rgba(${metaEndRgb.r},${metaEndRgb.g},${metaEndRgb.b},${metaBgOpacity}))`
 : `linear-gradient(to right, ${primaryColor}, ${secondaryColor})`;
 
 let style = document.getElementById('form-customization-styles');
 if (!style) {
 style = document.createElement('style');
 style.id = 'form-customization-styles';
 document.head.appendChild(style);
 }
 
 style.textContent = `
 body { background-color:${background} !important; color:${textColor} !important; }
 #headerIcon,#headerTitle,#headerSubtitle { color:${titleColor} !important; }
 #formMetaStrip { background:${metaBg} !important; }
 #formHeader { background-color:${descBg} !important; }
 #registrationForm { background-color:${formBg} !important; }
 #formEventDateValue,#formUbicacionValue { color:${metaTextColor} !important; }
 #formMetaStrip .form-meta-strip-heading { color:${metaTextColor} !important; opacity:0.88 !important; }
 #formTitle,h2,h3 { color:${textColor} !important; }
 p,label,.text-sm { color:${textColor} !important; }
 #submitButton,button[type="submit"]{
 background:linear-gradient(to right,${primaryColor},${secondaryColor}) !important;
 color:#fff !important;border:none !important;
 }
 #submitButton:hover,button[type="submit"]:hover{
 background:linear-gradient(to right,${primaryColor}dd,${secondaryColor}dd) !important;
 }
 input,select,textarea{background-color:transparent !important;color:${textColor} !important;}
 input:focus,select:focus,textarea:focus{
 border-color:${primaryColor} !important; -tw-ring-color:${primaryColor} !important;
 }
 .bg-white,.bg-gray-50,.bg-gray-100,.bg-gray-200{background-color:transparent !important;}
 .text-gray-900,.text-gray-800,.text-gray-700,.text-gray-600,.text-gray-500{color:${textColor} !important;}
 i.fas,i.fab,.fas,.fab{color:${textColor} !important;}
 `;
 /* La imagen de cabecera la gestiona FormLogoLoader + GET /public/forms/{id}/logo */
 }
 }
 
 // ================== SISTEMA DE CAMPOS (OOP) ==================
 
 const FIELD_BASE_CLASS = 'w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 transition-all duration-300';
 const SOCIAL_FIELDS = ['instagram', 'facebook', 'tiktok', 'twitter'];
 
 class Field {
 constructor(field, category) {
 this.field = field;
 this.category = category;
 this.name = field.field_name.toLowerCase();
 this.type = field.field_type;
 this.required = field.is_required;
 }
 
 get requiredAttr() {
 return this.required ? 'required' : '';
 }

 get maxLengthAttr() {
 const n = this.field.max_length;
 return (n != null && n > 0) ? `maxlength="${n}"` : '';
 }
 
 label(extra = '') {
 return `
 <label for="${this.name}" class="block text-sm font-medium mb-2">
 ${this.field.field_label} ${this.required ? '<span class="text-red-500">*</span>' : ''} ${extra}
 </label>`;
 }
 
 wrapper(html, span = '') {
 return `<div class="${span}">${html}</div>`;
 }
 
 textInput() {
 const isAge = this.name === 'edad';
 const extraAge = isAge

 class FormRenderer {
 constructor(form, sections, container) {
 this.form = form;
 this.sections = sections || [];
 this.container = container;
 }
 
 groupFieldsBySection() {
 // Crear un mapa de secciones por ID
 const sectionsMap = {};
 this.sections.forEach(section => {
 sectionsMap[section.id] = {
 id: section.id,
 title: section.section_title,
 icon: section.section_icon,
 display_order: section.display_order,
 fields: []
 };
 });
 
 // Agrupar campos por section_id
 const fieldsWithoutSection = [];
 this.form.fields.forEach(field => {
 const sectionId = field.section_id;
 if (sectionId && sectionsMap[sectionId]) {
 sectionsMap[sectionId].fields.push(field);
 } else {
 fieldsWithoutSection.push(field);
 }
 });
 
 // Ordenar secciones por display_order
 const sortedSections = this.sections
 .map(s => sectionsMap[s.id])
 .filter(s => s && s.fields.length > 0)
 .sort((a, b) => a.display_order - b.display_order);
 
 return {
 sections: sortedSections,
 fieldsWithoutSection: fieldsWithoutSection
 };
 }
 
 createSection(section, fields) {
 if (!fields || fields.length === 0) return '';
 
 const isConsent = (section.title || '').toLowerCase().includes('consentimiento');
 const fieldsHtml = fields
 .map(f => {
 // Determinar categoría para campos sociales
 const name = f.field_name.toLowerCase();
 const isSocial = ['instagram','facebook','tiktok','twitter'].includes(name);
 return FieldFactory.create(f, isSocial ? 'social' : 'other').render();
 })
 .join('');
 
 return `
 <div class="space-y-6">
 <h3 class="text-2xl font-semibold mt-8 md:mt-10 mb-6 flex items-center">
 <i class="fas ${section.icon} mr-3"></i>${section.title}
 </h3>
 <div class="form-fields-grid${isConsent ? ' form-fields-grid--consent' : ''}">
 ${fieldsHtml}
 </div>
 </div>
 `;
 }
 
 createFieldsWithoutSection(fields) {
 if (!fields || fields.length === 0) return '';
 
 const fieldsHtml = fields
 .map(f => {
 const name = f.field_name.toLowerCase();
 const isSocial = ['instagram','facebook','tiktok','twitter'].includes(name);
 return FieldFactory.create(f, isSocial ? 'social' : 'other').render();
 })
 .join('');
 
 return `
 <div class="space-y-6">
 <div class="form-fields-grid">
 ${fieldsHtml}
 </div>
 </div>
 `;
 }

 $('#formDescription').textContent = descRaw;

 const conf = this.form.conferencista != null && String(this.form.conferencista).trim() !== ''

 const ubi = this.form.ubicacion != null && String(this.form.ubicacion).trim() !== ''
 ? String(this.form.ubicacion).trim() : '';

 const descBlock = document.getElementById('formDescriptionBlock');

 const confBlock = document.getElementById('formConferencistaBlock');

 if (descBlock && confBlock) {

 confBlock.classList.remove('md:col-span-2');

 }

 const hasDetails = descRaw !== '' || !!conf;

 const ubiMeta = document.getElementById('formUbicacionMetaBlock');
 const ubiVal = document.getElementById('formUbicacionValue');
 const metaGrid = document.getElementById('formMetaStripGrid');
 const dateCol = document.getElementById('formEventDateColumn');

 // ================== APP PRINCIPAL ==================
 
 class FormApp {
 constructor() {
 this.api = new ApiClient();
 this.customizer = new CustomizationManager();
 this.logoLoader = new FormLogoLoader('logoContainer');
 this.currentForm = null;
 this.formId = null;
 
 // DOM
 this.loadingState = $('#loadingState');
 this.errorState = $('#errorState');
 this.errorMessage = $('#errorMessage'); // error global
 this.formContainer = $('#formContainer');
 this.fieldsContainer = $('#formFieldsContainer');
 this.formElement = $('#registrationForm');
 this.successModal = $('#successModalBackdrop');
 this.successModalClose = $('#successModalClose');
 this.formErrorBox = $('#formError'); // error envío
 this.formErrorText = $('#errorMessageText');
 }
 
 init() {
 this.formId = getFormIdFromURL();
 if (!this.formId) {
 this.showError('No se especificó un ID de formulario en la URL');
 return;
 }
 
 this.loadForm();
 this.bindEvents();
 }
 
 bindEvents() {
 if (this.formElement) {
 this.formElement.addEventListener('submit', (e) => this.handleSubmit(e));
 }
 if (this.successModalClose) {
 this.successModalClose.addEventListener('click', () => this.closeSuccessModal());
 }
 if (this.successModal) {
 this.successModal.addEventListener('click', (e) => {
 if (e.target === this.successModal) this.closeSuccessModal();
 });
 }
 window.addEventListener('resize', () => {
 HeightNotifier.notify();
 if (this.currentForm && this.logoLoader) {
 this.logoLoader.refresh();
 }
 });
 setTimeout(() => HeightNotifier.notify(), 500);
 setInterval(() => HeightNotifier.notify(), 1000);
 }
 
 async loadForm() {
 try {
 console.log('[FormApp] Iniciando carga de formulario, ID:', this.formId);
 const { res, data } = await this.api.getForm(this.formId);
 console.log('[FormApp] Respuesta recibida:', { res, data });
 
 // Verificar si hay error en la respuesta
 if (!res.ok) {
 const errorMsg = data?.error || data?.message || 'Error al obtener el formulario';
 console.error('[FormApp] Error en respuesta:', errorMsg);
 throw new Error(errorMsg);
 }
 
 // La respuesta puede venir en diferentes formatos
 // Formato esperado: { success: true, form: {...} }
 // O directamente: { form: {...} }
 if (data && (data.success === false || (data.success !== true && !data.form))) {
 const errorMsg = data.message || data.error || 'Formulario no encontrado';
 console.error('[FormApp] Formulario no encontrado o error:', errorMsg);
 throw new Error(errorMsg);
 }
 
 // Extraer el formulario de la respuesta
 const form = data.form || data;
 if (!form || (typeof form === 'object' && !form.id && !form.form_name)) {
 console.error('[FormApp] Formulario inválido en respuesta:', form);
 throw new Error('El formulario recibido no tiene un formato válido');
 }
 
 console.log('[FormApp] Formulario cargado correctamente:', form);
 
 this.currentForm = form;
 
 // Obtener secciones del formulario
 let sections = [];
 try {
 const { res: sRes, data: sData } = await this.api.getSections(this.formId);
 console.log('[FormApp] Respuesta de secciones:', { sRes, sData });
 if (sRes.ok) {
 // La respuesta puede venir como { success: true, sections: [...] } o directamente { sections: [...] }
 sections = sData?.sections || sData || [];
 if (!Array.isArray(sections)) {
 console.warn('[FormApp] Secciones no es un array:', sections);
 sections = [];
 }
 }
 } catch (err) {
 console.error('[FormApp] Error obteniendo secciones:', err);
 sections = [];
 }
 // Table-per-form: derivar secciones/campos desde form.schema (IDs sintéticos 1..n que el backend)
 let schemaParsed = null;
 if (form.schema) {
 try {
 schemaParsed = typeof form.schema === 'string' ? JSON.parse(form.schema) : form.schema;
 } catch (e) {
 console.warn('[FormApp] No se pudo parsear form.schema:', e);
 }
 }
 // Derivar secciones y campos SOLO desde form.schema (sin retrocompatibilidad de claves)
 if (schemaParsed) {
 const secs = schemaParsed.sections;
 if (Array.isArray(secs)) {
 sections = secs.map((s, i) => ({
 id: i + 1,
 section_title: s.section_title != null ? s.section_title : 'Sección',
 section_icon: s.section_icon != null ? s.section_icon : 'fa-folder',
 display_order: s.display_order != null ? s.display_order : i
 }));
 console.log('[FormApp] Secciones derivadas de form.schema:', sections.length);
 }

 const sectionIdToNum = {};
 if (Array.isArray(secs)) {
 secs.forEach((s, i) => { sectionIdToNum[s.id] = i + 1; });
 }

 const rawFields = schemaParsed.fields;
 if (Array.isArray(rawFields)) {
 form.fields = rawFields.map((f, i) => ({
 id: i + 1,
 form_id: form.id,
 field_label: f.field_label != null ? f.field_label : '',
 field_name: f.field_name != null ? f.field_name : '',
 field_type: f.field_type != null ? f.field_type : 'text',
 field_options: f.field_options != null ? String(f.field_options) : '',
 is_required: !!f.is_required,
 max_length: f.max_length != null ? f.max_length : null,
 display_order: f.display_order != null ? f.display_order : i,
 section_id: f.section_id != null ? (sectionIdToNum[f.section_id] ?? null) : null
 }));
 this.currentForm = form;
 console.log('[FormApp] Campos derivados de form.schema:', form.fields.length);
 }
 }
 
 this.loadingState.classList.add('hidden');
 this.formContainer.classList.remove('hidden');
 
 const renderer = new FormRenderer(this.currentForm, sections, this.fieldsContainer);
 renderer.render();
 
 // Personalización de colores + imagen de cabecera en paralelo (logo: GET /public/forms/{id}/logo)
 try {
 await Promise.all([
 (async () => {
 const { res: cRes, data: cData } = await this.api.getCustomization(this.formId);
 console.log('[FormApp] Respuesta de personalización:', { cRes, cData });
 if (cRes.ok) {
 const customization = cData?.customization || cData;
 if (customization && typeof customization === 'object') {
 setTimeout(() => this.customizer.apply(customization), 50);
 }
 }
 })(),
 this.logoLoader.load(this.formId)
 ]);
 } catch (err) {
 console.error('[FormApp] Error cargando personalización o logo:', err);
 }
 } catch (err) {
 console.error(err);
 this.showError(err.message || 'Error al cargar el formulario');
 }
 }
 
 showError(msg) {
 this.loadingState.classList.add('hidden');
 this.errorState.classList.remove('hidden');
 if (this.errorMessage) this.errorMessage.textContent = msg;
 }
 
 showFormError(msg) {
 if (!this.formErrorBox || !this.formErrorText) {
 alert('⚠️ Error: ' + msg);
 return;
 }
 this.formErrorText.textContent = msg;
 this.formErrorBox.classList.remove('hidden');
 setTimeout(() => {
 this.formErrorBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
 HeightNotifier.notify();
 }, 100);
 }

 showSuccessModal() {
 if (!this.successModal) return;
 this.successModal.classList.add('show');
 this.successModal.setAttribute('aria-hidden', 'false');
 }

 closeSuccessModal() {
 if (!this.successModal) return;
 this.successModal.classList.remove('show');
 this.successModal.setAttribute('aria-hidden', 'true');
 setTimeout(() => HeightNotifier.notify(), 200);
 }

 buildPayload(formData) {
 const payload = { form_id: parseInt(this.formId), answers: [] };
 
 this.currentForm.fields.forEach(field => {
 const name = field.field_name;
 const type = field.field_type;
 let value = '';
 
 if (SOCIAL_CONFIG[name]) {
 if (!formData.has(`${name}_toggle`)) return;
 value = formData.get(name) || '';
 } else if (type === 'checkbox') {
 value = formData.has(name) ? 'true' : 'false';
 } else {
 value = formData.get(name) || '';
 }
 
 const backendName = FIELD_MAPPING[name];
 if (backendName) {
 if (backendName === 'data_consent' || backendName === 'newsletter') {
 payload[backendName] = value === 'true' || formData.has(name);
 } else if (backendName === 'age') {
 const n = parseInt(value);
 payload[backendName] = isNaN(n) || n <= 0 ? 0 : n;
 } else {
 payload[backendName] = value;
 }
 } else {
 payload.answers.push({ field_id: field.id, field_value: value });
 }
 });
 
 return payload;
 }
 
 async handleSubmit(e) {
 e.preventDefault();
 
 const submitBtn = this.formElement.querySelector('button[type="submit"]');
 const submitText = submitBtn.querySelector('.submit-text');
 const original = submitText.innerHTML;
 
 submitBtn.disabled = true;
 submitText.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Enviando...';
 
 try {
 const formData = new FormData(this.formElement);
 const payload = this.buildPayload(formData);
 
 const { res, data } = await this.api.submitForm(payload);
 
 if (!res.ok) {
 submitBtn.disabled = false;
 submitText.innerHTML = original;
 
 const msg = data.message || data.error || 'Error al enviar el formulario';
 if (res.status === 409) {
 this.closeSuccessModal();
 this.showFormError(msg);
 setTimeout(() => {
 alert('⚠️ ADVERTENCIA\n\n' + msg + '\n\nPor favor, verifica los datos e intenta con otra persona.');
 }, 300);
 return;
 }
 this.showFormError(msg);
 return;
 }
 
 if (data.success) {
 this.formErrorBox?.classList.add('hidden');
 this.showSuccessModal();
 submitBtn.disabled = false;
 submitText.innerHTML = original;
 setTimeout(() => HeightNotifier.notify(), 200);
 } else {
 this.showFormError(data.message || data.error || 'Error al enviar el formulario');
 }
 } catch (err) {
 console.error('[FormApp] handleSubmit error:', err);
 this.showFormError(err && err.message ? err.message : 'Error al enviar el formulario');
 submitBtn.disabled = false;
 submitText.innerHTML = original;
 }
 }
 }
